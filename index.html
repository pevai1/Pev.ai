<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BypassKit v4</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d12;--surface:#12151e;--surface2:#1a1e2a;
  --border:#232838;--border2:#2e3448;
  --text:#e8ecf4;--text2:#8b93a8;--text3:#4a5168;
  --accent:#00d4aa;--accent2:#00b891;
  --glow:rgba(0,212,170,0.15);--soft:rgba(0,212,170,0.08);
  --err:#ef4444;--err-s:rgba(239,68,68,0.08);
  --ok:#10b981;--ok-s:rgba(16,185,129,0.08);
  --shadow:0 8px 32px rgba(0,0,0,0.4);
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:36px 14px 60px;
background-image:radial-gradient(ellipse at 15% 10%,rgba(0,212,170,0.05) 0%,transparent 50%),radial-gradient(ellipse at 85% 85%,rgba(99,102,241,0.04) 0%,transparent 50%);}

.header{text-align:center;margin-bottom:28px;animation:fadeD .4s ease both}
@keyframes fadeD{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
.logo-wrap{display:inline-flex;align-items:center;gap:12px;margin-bottom:8px}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),#00a8ff);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 24px var(--glow)}
h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.5px}
h1 span{color:var(--accent)}
.subtitle{font-size:13px;color:var(--text2);font-weight:500}
.badge{display:inline-flex;align-items:center;gap:5px;background:var(--ok-s);border:1px solid rgba(16,185,129,.2);color:var(--ok);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:8px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:600px;box-shadow:var(--shadow);animation:fadeU .4s ease both}
@keyframes fadeU{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.card+.card{margin-top:14px;animation-delay:.07s}
.card-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';display:inline-block;width:3px;height:13px;background:var(--accent);border-radius:2px}

.input-label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px}
.input-field{width:100%;padding:12px 14px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);outline:none;transition:all .2s;margin-bottom:14px}
.input-field:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--soft);background:#1e2230}
.input-field::placeholder{color:var(--text3)}

.btn-main{width:100%;padding:14px;background:var(--accent);color:#000;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 20px var(--glow)}
.btn-main:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-main:disabled{background:var(--border2);color:var(--text3);cursor:not-allowed;transform:none;box-shadow:none}

.progress-wrap{margin-top:18px;display:none}
.progress-wrap.show{display:block}
.bar-bg{background:var(--surface2);border-radius:6px;height:5px;overflow:hidden;margin-bottom:12px}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#00a8ff);border-radius:6px;width:0%;transition:width .5s ease}
.steps{display:flex;flex-direction:column;gap:7px}
.step{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text3);font-weight:500;transition:color .25s}
.step.active{color:var(--accent)}.step.done{color:var(--ok)}.step.error{color:var(--err)}
.sdot{width:18px;height:18px;border-radius:50%;background:var(--surface2);border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;transition:all .25s}
.step.active .sdot{border-color:var(--accent);background:var(--soft);animation:pulse 1s infinite}
.step.done .sdot{border-color:var(--ok);background:var(--ok-s);color:var(--ok)}
.step.error .sdot{border-color:var(--err);background:var(--err-s);color:var(--err)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,170,.4)}50%{box-shadow:0 0 0 5px rgba(0,212,170,0)}}

.result-box{margin-top:16px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:10px;padding:14px 16px;display:none}
.result-box.show{display:block}
.result-box.ok{border-color:var(--ok);background:var(--ok-s)}
.result-box.fail{border-color:var(--err);background:var(--err-s)}
.result-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--text3);margin-bottom:8px}
.result-box.ok .result-label{color:var(--ok)}.result-box.fail .result-label{color:var(--err)}
.result-val{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);word-break:break-all;line-height:1.6}
.via{display:inline-block;font-size:10px;font-weight:700;color:var(--text3);background:var(--border);padding:2px 8px;border-radius:20px;margin-top:8px}
.result-acts{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn-s{padding:7px 14px;border-radius:7px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border2);transition:all .15s}
.btn-copy{background:var(--surface);color:var(--text2)}.btn-copy:hover{background:var(--border2);color:var(--text)}
.btn-copy.copied{background:var(--ok-s);border-color:var(--ok);color:var(--ok)}
.btn-open{background:var(--accent);color:#000;border-color:var(--accent);font-weight:800}.btn-open:hover{background:var(--accent2)}

/* DEBUG BOX */
.debug-box{margin-top:10px;background:#0a0c10;border:1px solid var(--border2);border-radius:8px;padding:10px 12px;display:none}
.debug-box.show{display:block}
.debug-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.debug-val{font-family:'JetBrains Mono',monospace;font-size:11px;color:#6b7a99;line-height:1.6;white-space:pre-wrap;word-break:break-all;max-height:120px;overflow-y:auto}

.hist-list{display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto}
.hist-list::-webkit-scrollbar{width:3px}.hist-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.hist-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 13px;display:flex;align-items:center;gap:10px;cursor:pointer}
.hdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.hdot.ok{background:var(--ok)}.hdot.fail{background:var(--err)}
.hurl{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hres{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);flex-shrink:0;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.htime{font-size:10px;color:var(--text3);flex-shrink:0}
.empty-h{text-align:center;padding:20px;color:var(--text3);font-size:13px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface2);color:var(--text);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid var(--border2);box-shadow:var(--shadow);opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:480px){body{padding:20px 10px 50px}.card{padding:18px 14px}h1{font-size:22px}}
</style>
</head>
<body>

<div class="header">
  <div class="logo-wrap">
    <div class="logo-icon">⚡</div>
    <h1>Bypass<span>Kit</span> <span style="font-size:14px;color:var(--text3)">v4</span></h1>
  </div>
  <p class="subtitle">Linkvertise Bypasser</p>
  <div class="badge">✓ Netlify Ready · No Server</div>
</div>

<div class="card">
  <div class="card-title">Bypass Linkvertise</div>
  <label class="input-label">URL Linkvertise</label>
  <input type="url" class="input-field" id="urlInput" placeholder="https://linkvertise.com/454392/nama-script">
  <button class="btn-main" id="bypassBtn" onclick="runBypass()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Jalankan Bypass
  </button>

  <div class="progress-wrap" id="pw">
    <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
    <div class="steps" id="steps"></div>
  </div>

  <div class="result-box" id="rb">
    <div class="result-label" id="rl">Hasil</div>
    <div class="result-val" id="rv"></div>
    <div id="vt"></div>
    <div class="result-acts">
      <button class="btn-s btn-copy" id="cpBtn" onclick="copyRes()">📋 Salin</button>
      <button class="btn-s btn-open" id="opBtn" onclick="openRes()" style="display:none">↗ Buka</button>
    </div>
  </div>

  <!-- DEBUG: tampil kalau gagal -->
  <div class="debug-box" id="debugBox">
    <div class="debug-title">Debug Response</div>
    <div class="debug-val" id="debugVal"></div>
  </div>
</div>

<div class="card">
  <div class="card-title">Riwayat</div>
  <div class="hist-list" id="hl"><div class="empty-h">Belum ada riwayat.</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const STEPS_DEF = [
  "Parsing URL Linkvertise...",
  "Fetch link info (Step 1)...",
  "Generate serial token...",
  "Fetch URL target (Step 2)...",
];

const PROXY = "https://api.allorigins.win/get?url=";

let lastRes = null;
let hist = JSON.parse(localStorage.getItem("bk4_hist") || "[]");
let debugLog = [];

// ─── PARSE URL ───
function parseLV(url) {
  try {
    const u = new URL(url);
    if (!u.hostname.includes("linkvertise")) return null;
    // Hapus query string & trailing slash
    const clean = u.pathname.replace(/^\//, "").replace(/\/$/, "").split("?")[0];
    const parts = clean.split("/");
    if (parts.length < 2) return null;
    return { id: parts[0], slug: parts.slice(1).join("/") };
  } catch { return null; }
}

// ─── FETCH VIA PROXY ───
async function proxyFetch(url) {
  const res = await fetch(PROXY + encodeURIComponent(url), {
    signal: AbortSignal.timeout(15000)
  });
  if (!res.ok) throw new Error("Proxy HTTP " + res.status);
  const wrapper = await res.json();
  if (!wrapper.contents) throw new Error("Proxy: contents kosong");
  return JSON.parse(wrapper.contents);
}

// ─── BYPASS LOGIC ───
async function bypassLinkvertise(rawUrl) {
  debugLog = [];

  const parsed = parseLV(rawUrl);
  if (!parsed) return { ok: false, err: "URL bukan Linkvertise valid.\nFormat: linkvertise.com/{id}/{slug}" };

  const { id, slug } = parsed;
  debugLog.push(`Parsed → id: ${id}, slug: ${slug}`);

  // ── STEP 1: Get link info ──
  const infoEndpoint = `https://publisher.linkvertise.com/api/v1/redirect/link/static/${id}/${slug}`;
  debugLog.push(`Step1 URL: ${infoEndpoint}`);

  let info;
  try {
    info = await proxyFetch(infoEndpoint);
    debugLog.push(`Step1 response: ${JSON.stringify(info).slice(0, 200)}`);
  } catch (e) {
    return { ok: false, err: `Step1 gagal: ${e.message}`, debug: debugLog.join("\n") };
  }

  // Cari link_id dari berbagai kemungkinan struktur response
  const linkId =
    info?.data?.link?.id ||
    info?.data?.id ||
    info?.link?.id ||
    info?.id ||
    null;

  debugLog.push(`Link ID ditemukan: ${linkId}`);

  if (!linkId) {
    return {
      ok: false,
      err: `Link ID tidak ada di response.\nCheck debug untuk struktur response.`,
      debug: debugLog.join("\n")
    };
  }

  // ── STEP 2: Build serial & fetch target ──
  const timestamp = Math.floor(Date.now() / 1000);
  const serial = btoa(JSON.stringify({
    timestamp,
    random: "6548307",
    link_id: linkId
  }));

  // Coba 2 endpoint: serial (lama) dan X-Linkvertise-UT (baru)
  const targetEndpoints = [
    `https://publisher.linkvertise.com/api/v1/redirect/link/${id}/${slug}/target?serial=${encodeURIComponent(serial)}`,
    `https://publisher.linkvertise.com/api/v1/redirect/link/${id}/${slug}/target?X-Linkvertise-UT=${encodeURIComponent(serial)}`,
  ];

  for (const ep of targetEndpoints) {
    debugLog.push(`\nTrying target: ${ep}`);
    try {
      const target = await proxyFetch(ep);
      debugLog.push(`Target response: ${JSON.stringify(target).slice(0, 300)}`);

      const finalUrl =
        target?.data?.target?.url ||
        target?.data?.url ||
        target?.url ||
        target?.target ||
        target?.link ||
        null;

      if (finalUrl) {
        debugLog.push(`\n✅ Final URL: ${finalUrl}`);
        return { ok: true, result: finalUrl, via: "publisher.linkvertise.com", debug: debugLog.join("\n") };
      }
    } catch (e) {
      debugLog.push(`Error: ${e.message}`);
      continue;
    }
  }

  return {
    ok: false,
    err: "Dapat link ID tapi URL target tidak ditemukan.\nCek debug di bawah.",
    debug: debugLog.join("\n")
  };
}

// ─── RENDER STEPS ───
function renderSteps(activeIdx, errIdx = -1) {
  document.getElementById("steps").innerHTML = STEPS_DEF.map((s, i) => {
    let c = "", d = String(i+1);
    if (i < activeIdx) { c = "done"; d = "✓"; }
    else if (i === errIdx) { c = "error"; d = "✕"; }
    else if (i === activeIdx) { c = "active"; d = "●"; }
    return `<div class="step ${c}"><div class="sdot">${d}</div><span>${s}</span></div>`;
  }).join("");
}
function setBar(p) { document.getElementById("bar").style.width = p + "%"; }

// ─── MAIN ───
async function runBypass() {
  const url = document.getElementById("urlInput").value.trim();
  if (!url) { toast("Masukkin URL dulu!"); return; }
  if (!url.includes("linkvertise")) { toast("Harus URL Linkvertise!"); return; }

  const btn = document.getElementById("bypassBtn");
  btn.disabled = true;
  btn.innerHTML = `⏳ Processing...`;

  document.getElementById("pw").classList.add("show");
  document.getElementById("rb").classList.remove("show","ok","fail");
  document.getElementById("debugBox").classList.remove("show");

  renderSteps(0); setBar(10);
  await w(200); renderSteps(1); setBar(25);

  const res = await bypassLinkvertise(url);

  setBar(100);
  renderSteps(res.ok ? 4 : 3, res.ok ? -1 : 3);
  await w(150);

  showResult(res.ok, res.ok ? res.result : res.err, res.via, url);

  // Tampilkan debug kalau gagal
  if (!res.ok && res.debug) {
    document.getElementById("debugBox").classList.add("show");
    document.getElementById("debugVal").textContent = res.debug;
  }

  addHist(url, res.ok ? res.result : "GAGAL", res.ok);

  btn.disabled = false;
  btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Jalankan Bypass`;
}

function showResult(ok, val, via, src) {
  lastRes = val;
  const rb = document.getElementById("rb");
  rb.className = "result-box show " + (ok ? "ok" : "fail");
  document.getElementById("rl").textContent = ok ? "✅ Bypass Berhasil" : "❌ Bypass Gagal";
  document.getElementById("rv").textContent = val;
  document.getElementById("vt").innerHTML = via ? `<span class="via">via ${via}</span>` : "";
  document.getElementById("opBtn").style.display = ok && val?.startsWith("http") ? "inline-flex" : "none";
  document.getElementById("cpBtn").textContent = "📋 Salin";
  document.getElementById("cpBtn").className = "btn-s btn-copy";
}

function copyRes() {
  if (!lastRes) return;
  doCopy(lastRes, () => {
    const b = document.getElementById("cpBtn");
    b.textContent = "✅ Tersalin!"; b.classList.add("copied");
    toast("Tersalin! ✅");
    setTimeout(() => { b.textContent = "📋 Salin"; b.classList.remove("copied"); }, 2000);
  });
}
function openRes() { if (lastRes?.startsWith("http")) window.open(lastRes, "_blank"); }

function addHist(url, result, ok) {
  const t = new Date();
  const time = t.getHours().toString().padStart(2,"0") + ":" + t.getMinutes().toString().padStart(2,"0");
  hist.unshift({ url, result, ok, time });
  if (hist.length > 30) hist.pop();
  localStorage.setItem("bk4_hist", JSON.stringify(hist));
  renderHist();
}
function renderHist() {
  const el = document.getElementById("hl");
  if (!hist.length) { el.innerHTML = '<div class="empty-h">Belum ada riwayat.</div>'; return; }
  el.innerHTML = hist.map(h => `
    <div class="hist-item">
      <div class="hdot ${h.ok?'ok':'fail'}"></div>
      <div class="hurl">${h.url}</div>
      <div class="hres">${h.result}</div>
      <div class="htime">${h.time}</div>
    </div>`).join("");
}

function w(ms) { return new Promise(r => setTimeout(r, ms)); }
function doCopy(t, cb) {
  if (navigator.clipboard && window.isSecureContext) navigator.clipboard.writeText(t).then(cb).catch(() => fb(t,cb));
  else fb(t, cb);
}
function fb(t, cb) {
  const ta = document.createElement("textarea");
  ta.value = t; ta.style.cssText = "position:fixed;top:-9999px;opacity:0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand("copy"); cb(); } catch(e){}
  document.body.removeChild(ta);
}
let tt;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  clearTimeout(tt); tt = setTimeout(() => el.classList.remove("show"), 2500);
}

renderHist();
</script>
</body>
</html>
